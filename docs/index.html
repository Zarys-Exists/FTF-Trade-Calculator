<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    trades are fair, wins, or losses. It is easy to navigate, includes values for every item, and uses the official value list">

    <meta name="author" content="Zarys">

    <meta property="og:type" content="website">
    <meta property="og:title" content="FTF Trade Calculator">
    <meta property="og:description" content="Evaluate your Flee The Facility trades with our FTF Trade Calculator. It uses the official values to determine if your trades are fair, wins, or losses.">
    <meta property="og:url" content="https://zarys-exists.github.io/FTF-Trade-Calculator/">
    <meta property="og:image" content="https://zarys-exists.github.io/FTF-Trade-Calculator/favicon/favicon-32x32.png">

    <!-- Google tag (gtag.js) -->

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      gtag('config', 'G-D8W9RXNFB2');
    </script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <script>
        const base = document.createElement('base');
        if (!location.hostname.includes('localhost') && !location.hostname.includes('127.0.0.1')) {
            base.href = '/FTF-Trade-Calculator/';
        } else {
            base.href = '/';
        }
        document.head.appendChild(base);
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        if (localStorage.getItem('theme') !== 'light') {
            document.documentElement.classList.add('dark-theme');
        }
    </script>
</head>
<body>
    <div class="site-header">
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <h1 class="site-title">Zarys's FTF Calculator</h1>
        <button id="theme-toggle" class="theme-toggle-icon" title="Toggle Dark Theme" aria-label="Toggle dark mode">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>

    <div class="nav-drawer-overlay" id="nav-overlay"></div>
    <nav class="nav-drawer" id="nav-drawer" aria-hidden="true">
        <div class="nav-drawer-header">Menu</div>
        <a href="./" class="nav-drawer-link active">Trade Calculator</a>
        <a href="guide.html" class="nav-drawer-link">Use Guide</a>
    </nav>

    <div class="trade-page-container">
        <!-- WFL Bar -->
        <div class="wfl-bar-wrapper">
            <div class="wfl-bar-labels">
                <span>Win</span>
                <span>Fair</span>
                <span>Lose</span>
            </div>
            <div class="wfl-bar-track">
                <div id="wfl-bar-fill" class="wfl-bar-fill"></div>
            </div>
        </div>

        <div class="trade-layout">
            <!-- Your Offer Section -->
            <div class="offer-container">
                <h2>Your Offer</h2>
                <div class="trade-grid" id="your-offer-grid"></div>
                <div class="total-value" id="your-total">0 fv</div>
            </div>

            <!-- WFL Result Section -->
            <div class="wfl-container">
                <div id="wfl-result" class="wfl-result-fair">--</div>
                <button id="reset-trade-btn">Reset</button>
            </div>

            <!-- Their Offer Section -->
            <div class="offer-container">
                <h2>Their Offer</h2>
                <div class="trade-grid" id="their-offer-grid"></div>
                <div class="total-value" id="their-total">0 fv</div>
            </div>
        </div>

        <!-- Item Selection Modal -->
        <div id="item-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Select an Item</h3>
            <div class="modal-body">
                <div class="rarity-sidebar">
                    <button class="rarity-filter-btn active" data-rarity="all">All</button>
                    <button class="rarity-filter-btn" data-rarity="legendary">Legendary</button>
                    <button class="rarity-filter-btn" data-rarity="epic">Epic</button>
                    <button class="rarity-filter-btn" data-rarity="rare">Rare</button>
                    <button class="rarity-filter-btn" data-rarity="common">Common</button>
                    <div class="shg-buttons">
                        <button class="shg-btn" data-shg="h" title="Hammer mode">H</button>
                        <button class="shg-btn" data-shg="g" title="Gem mode">G</button>
                    </div>
                </div>
                <div class="item-display-area">
                    <input type="text" id="item-search" placeholder="Search for items...">
                    <div id="item-list" class="item-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="trade.js"></script>
    <script>
        // Hamburger menu logic
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const navDrawer = document.getElementById('nav-drawer');
        const navOverlay = document.getElementById('nav-overlay');

        function openDrawer() {
            hamburgerBtn.classList.add('is-open');
            hamburgerBtn.setAttribute('aria-expanded', 'true');
            navDrawer.classList.add('is-open');
            navDrawer.setAttribute('aria-hidden', 'false');
            navOverlay.classList.add('is-visible');
            document.body.classList.add('drawer-open');
        }

        function closeDrawer() {
            hamburgerBtn.classList.remove('is-open');
            hamburgerBtn.setAttribute('aria-expanded', 'false');
            navDrawer.classList.remove('is-open');
            navDrawer.setAttribute('aria-hidden', 'true');
            navOverlay.classList.remove('is-visible');
            document.body.classList.remove('drawer-open');
        }

        hamburgerBtn.addEventListener('click', () => {
            hamburgerBtn.classList.contains('is-open') ? closeDrawer() : openDrawer();
        });
        navOverlay.addEventListener('click', closeDrawer);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDrawer();
        });

        // Theme toggle
        const themeToggleBtn = document.getElementById('theme-toggle');
        const htmlEl = document.documentElement;

        function syncThemeIcon() {
            if (htmlEl.classList.contains('dark-theme')) {
                themeToggleBtn.classList.add('is-dark');
            } else {
                themeToggleBtn.classList.remove('is-dark');
            }
        }
        syncThemeIcon();

        themeToggleBtn.addEventListener('click', () => {
            const isDark = htmlEl.classList.toggle('dark-theme');
            if (isDark) {
                localStorage.removeItem('theme');
            } else {
                localStorage.setItem('theme', 'light');
            }
            syncThemeIcon();
        });
    </script>
</body>
</html>
